name: Build, Test, and Deploy Try .NET API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: "BuildAndUploadImage"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-node

      - name: Set up .NET environment
        uses: ./.github/actions/setup-dotnet

      - name: Run ciTest for microsoft-trydotnet
        working-directory: src/microsoft-trydotnet
        run: npm run ciTest

      - name: Run ciTest for microsoft-trydotnet-editor
        working-directory: src/microsoft-trydotnet-editor
        run: npm run ciTest

      - name: Run .NET Tests
        id: run-dotnet-tests
        run: dotnet test --no-build --configuration Release --blame-hang-timeout 15m --blame-hang-dump-type full -l trx --results-directory ./TestResults
        env:
          POCKETLOGGER_LOG_PATH: ${{ github.workspace }}/artifacts/logs/pocketlogger.log

      - name: Convert TRX to Playlist
        if: ${{ steps.run-dotnet-tests.outcome == 'failure' || failure() }}
        uses: BenjaminMichaelis/trx-to-vsplaylist@v3
        with:
          trx-file-path: './TestResults/*.trx'
          test-outcomes: 'Failed'
          artifact-name: 'linux-test-playlists'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

        # Build but no push with a PR
      - name: Docker build (no push)
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        uses: docker/build-push-action@v7
        with:
          push: false
          tags: temp-pr-validation
          file: ./Dockerfile

      - name: Build Container Image
        if: github.event_name != 'pull_request_target' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          tags: ${{ vars.DEVCONTAINER_REGISTRY }}/try:${{ github.sha }},${{ vars.DEVCONTAINER_REGISTRY }}/try:latest,${{ vars.PRODCONTAINER_REGISTRY }}/try:${{ github.sha }},${{ vars.PRODCONTAINER_REGISTRY }}/try:latest
          file: ./Dockerfile
          context: .
          outputs: type=docker,dest=${{ github.workspace }}/tryimage.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload artifact
        if: github.event_name != 'pull_request_target' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tryimage
          path: ${{ github.workspace }}/tryimage.tar

  build-and-test-windows:
    # Ensures .NET build and unit tests pass on Windows, matching the original
    # Azure DevOps Windows_NT job. Integration tests are covered separately.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-node

      - name: Set up .NET environment
        uses: ./.github/actions/setup-dotnet

      - name: Run .NET Tests
        id: run-dotnet-tests
        run: dotnet test --no-build --configuration Release --blame-hang-timeout 15m --blame-hang-dump-type full -l trx --results-directory ./TestResults
        env:
          POCKETLOGGER_LOG_PATH: ${{ github.workspace }}/artifacts/logs/pocketlogger.log

      - name: Convert TRX to Playlist
        if: ${{ steps.run-dotnet-tests.outcome == 'failure' || failure() }}
        uses: BenjaminMichaelis/trx-to-vsplaylist@v3
        with:
          trx-file-path: './TestResults/*.trx'
          test-outcomes: 'Failed'
          artifact-name: 'windows-test-playlists'

  integration-tests:
    # Integration tests use Playwright and are gated behind RunIntegrationTests=true.
    # IntegrationTestFactAttribute explicitly skips these tests on Linux, so a
    # Windows runner is required to actually execute them.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-node

      - name: Set up .NET environment
        uses: ./.github/actions/setup-dotnet

      - name: Run .NET Integration Tests
        id: run-dotnet-integration-tests
        run: dotnet test --no-build --configuration Release --blame-hang-timeout 15m --blame-hang-dump-type full -l trx --results-directory ./TestResults
        env:
          RunIntegrationTests: true
          POCKETLOGGER_LOG_PATH: ${{ github.workspace }}/artifacts/logs/pocketlogger.log
          TRYDOTNET_PREBUILDS_PATH: ${{ github.workspace }}/artifacts/trydotnet-prebuilds

      - name: Convert TRX to Playlist
        if: ${{ steps.run-dotnet-integration-tests.outcome == 'failure' || failure() }}
        uses: BenjaminMichaelis/trx-to-vsplaylist@v3
        with:
          trx-file-path: './TestResults/*.trx'
          test-outcomes: 'Failed'
          artifact-name: 'integration-test-playlists'

  deploy-development:
    if: github.event_name != 'pull_request_target' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-and-test, build-and-test-windows, integration-tests]
    concurrency:
      group: deploy-development-try
      cancel-in-progress: false
    environment:
      name: "Development"
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: tryimage
          path: ${{ github.workspace }}

      - name: Load image
        run: |
          docker load --input ${{ github.workspace }}/tryimage.tar
          docker image ls -a

      - name: Log in to container registry
        run: |
          REGISTRY="${{ vars.DEVCONTAINER_REGISTRY }}"
          az acr login --name "${REGISTRY%.azurecr.io}"

      - name: Push Image to Container Registry
        env:
          REGISTRY_URL: ${{ vars.DEVCONTAINER_REGISTRY }}
        run: docker push --all-tags $REGISTRY_URL/try

      - name: Configure Container App Identity and Registry
        uses: azure/CLI@v3
        env:
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
          RESOURCEGROUP: ${{ vars.RESOURCEGROUP }}
          REGISTRY_URL: ${{ vars.DEVCONTAINER_REGISTRY }}
        with:
          inlineScript: |
            # Container app must already exist; use az containerapp up manually to bootstrap if needed
            az extension add --name containerapp --upgrade
            az containerapp identity assign --name $CONTAINER_APP_NAME --resource-group $RESOURCEGROUP --user-assigned ${{ secrets.TRY_UAMI_RESOURCE_ID }}
            az containerapp registry set --name $CONTAINER_APP_NAME --resource-group $RESOURCEGROUP --server $REGISTRY_URL --identity ${{ secrets.TRY_UAMI_RESOURCE_ID }}
            az containerapp update --name $CONTAINER_APP_NAME --resource-group $RESOURCEGROUP \
              --image $REGISTRY_URL/try:${{ github.sha }}

  deploy-production:
    if: github.event_name != 'pull_request_target' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: deploy-development
    concurrency:
      group: deploy-production-try
      cancel-in-progress: false
    environment:
      name: "Production"
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: tryimage
          path: ${{ github.workspace }}

      - name: Load image
        run: |
          docker load --input ${{ github.workspace }}/tryimage.tar
          docker image ls -a

      - name: Log in to container registry
        run: |
          REGISTRY="${{ vars.PRODCONTAINER_REGISTRY }}"
          az acr login --name "${REGISTRY%.azurecr.io}"

      - name: Push Image to Container Registry
        run: docker push --all-tags ${{ vars.PRODCONTAINER_REGISTRY }}/try

      - name: Configure Container App Identity and Registry
        uses: azure/CLI@v3
        env:
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
          RESOURCEGROUP: ${{ vars.RESOURCEGROUP }}
          REGISTRY_URL: ${{ vars.PRODCONTAINER_REGISTRY }}
        with:
          inlineScript: |
            # Container app must already exist; use az containerapp up manually to bootstrap if needed
            az extension add --name containerapp --upgrade
            az containerapp identity assign --name $CONTAINER_APP_NAME --resource-group $RESOURCEGROUP --user-assigned ${{ secrets.TRY_UAMI_RESOURCE_ID }}
            az containerapp registry set --name $CONTAINER_APP_NAME --resource-group $RESOURCEGROUP --server $REGISTRY_URL --identity ${{ secrets.TRY_UAMI_RESOURCE_ID }}
            az containerapp update --name $CONTAINER_APP_NAME --resource-group $RESOURCEGROUP \
              --image $REGISTRY_URL/try:${{ github.sha }}
