version: 2
updates:
  # NuGet dependencies - using central package management
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions (for future workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    ignore:
      # These actions are bundled into dependabot-major-review.lock.yml via
      # `gh aw compile`. Dependabot SHA bumps to these bypass the compile step
      # and break the compile-time/runtime contract. Regenerate the lock file
      # manually with `gh aw compile .github/workflows/dependabot-major-review.md`
      # when updating these dependencies.
      - dependency-name: "github/gh-aw"
      - dependency-name: "github/gh-aw-actions"

  # npm - microsoft-trydotnet
  - package-ecosystem: "npm"
    directory: "/src/microsoft-trydotnet"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "npm"

  # npm - microsoft-trydotnet-editor
  - package-ecosystem: "npm"
    directory: "/src/microsoft-trydotnet-editor"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "npm"

  # npm - microsoft-trydotnet-styles
  - package-ecosystem: "npm"
    directory: "/src/microsoft-trydotnet-styles"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "npm"

  # npm - microsoft-learn-mock
  - package-ecosystem: "npm"
    directory: "/src/microsoft-learn-mock"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dotnet-sdk"
